version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shopcompare-postgres
    environment:
      POSTGRES_DB: shopcompare
      POSTGRES_USER: shopcompare
      POSTGRES_PASSWORD: shopcompare123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
